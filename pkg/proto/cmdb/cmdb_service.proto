syntax = "proto3";

package opsnexus.cmdb;

option go_package = "github.com/opsnexus/opsnexus/pkg/proto/cmdb";

import "google/protobuf/timestamp.proto";
import "pkg/proto/common/common.proto";

// CMDBService provides synchronous RPC access to the CMDB domain.
// Used by alert service (to resolve host/service metadata), AI service
// (to build topology context for root cause analysis), and notification
// service (to resolve owner contacts).
service CMDBService {
  // GetCI retrieves a configuration item by ID.
  rpc GetCI(GetCIRequest) returns (CI);

  // BatchGetCIs retrieves multiple CIs by their IDs.
  rpc BatchGetCIs(BatchGetCIsRequest) returns (BatchGetCIsResponse);

  // GetTopology returns the dependency graph around a CI.
  rpc GetTopology(GetTopologyRequest) returns (GetTopologyResponse);

  // GetCIOwner returns the owner (contact) info for a CI.
  rpc GetCIOwner(GetCIOwnerRequest) returns (CIOwner);
}

message GetCIRequest {
  string ci_id = 1;
}

message BatchGetCIsRequest {
  repeated string ci_ids = 1;
}

message BatchGetCIsResponse {
  repeated CI items = 1;
}

message GetTopologyRequest {
  string root_ci_id = 1;
  int32 depth = 2;           // Max traversal depth (1-10)
  string direction = 3;      // upstream, downstream, both
  repeated string type_filter = 4; // Filter by CI type
}

message GetTopologyResponse {
  repeated CI nodes = 1;
  repeated Relationship edges = 2;
}

message GetCIOwnerRequest {
  string ci_id = 1;
}

message CIOwner {
  string user_id = 1;
  string name = 2;
  string email = 3;
  string phone = 4;
  string team = 5;
}

message CI {
  string id = 1;
  string type = 2;
  string name = 3;
  string description = 4;
  string status = 5; // active, inactive, decommissioned, maintenance
  map<string, string> attributes = 6;
  repeated opsnexus.common.KeyValue labels = 7;
  string owner_id = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp updated_at = 10;
}

message Relationship {
  string id = 1;
  string source_ci_id = 2;
  string target_ci_id = 3;
  string type = 4; // depends_on, runs_on, connects_to, member_of, contains
}
