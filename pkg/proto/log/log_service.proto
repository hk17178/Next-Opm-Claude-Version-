syntax = "proto3";

package opsnexus.log;

option go_package = "github.com/opsnexus/opsnexus/pkg/proto/log";

import "google/protobuf/timestamp.proto";
import "pkg/proto/common/common.proto";

// LogService provides synchronous RPC access to the log domain.
// Used by other services for direct log queries (e.g., AI service fetching
// context logs for analysis, alert service fetching log samples).
service LogService {
  // SearchLogs performs a synchronous log search.
  rpc SearchLogs(SearchLogsRequest) returns (SearchLogsResponse);

  // GetLogEntry retrieves a single log entry by ID.
  rpc GetLogEntry(GetLogEntryRequest) returns (LogEntry);

  // GetLogContext retrieves logs surrounding a specific entry (for context).
  rpc GetLogContext(GetLogContextRequest) returns (GetLogContextResponse);
}

message SearchLogsRequest {
  string query = 1;
  opsnexus.common.TimeRange time_range = 2;
  repeated opsnexus.common.KeyValue filters = 3;
  opsnexus.common.PageRequest pagination = 4;
  string sort_order = 5; // "asc" or "desc"
}

message SearchLogsResponse {
  repeated LogEntry entries = 1;
  opsnexus.common.PageResponse pagination = 2;
}

message GetLogEntryRequest {
  string log_id = 1;
}

message GetLogContextRequest {
  string log_id = 1;
  int32 lines_before = 2;
  int32 lines_after = 3;
}

message GetLogContextResponse {
  repeated LogEntry before = 1;
  LogEntry target = 2;
  repeated LogEntry after = 3;
}

message LogEntry {
  string id = 1;
  google.protobuf.Timestamp timestamp = 2;
  string level = 3;
  string message = 4;
  string service_name = 5;
  string host_id = 6;
  repeated opsnexus.common.KeyValue labels = 7;
  string trace_id = 8;
  string span_id = 9;
}
