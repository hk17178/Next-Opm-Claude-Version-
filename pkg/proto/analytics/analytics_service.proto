syntax = "proto3";

package opsnexus.analytics;

option go_package = "github.com/opsnexus/opsnexus/pkg/proto/analytics";

import "google/protobuf/timestamp.proto";
import "pkg/proto/common/common.proto";

// AnalyticsService provides synchronous RPC access to the analytics domain.
// Used by other services to query aggregated metrics and SLA data.
service AnalyticsService {
  // QueryMetrics retrieves time-series metric data.
  rpc QueryMetrics(QueryMetricsRequest) returns (QueryMetricsResponse);

  // GetSLAReport retrieves an SLA compliance report for a time period.
  rpc GetSLAReport(GetSLAReportRequest) returns (SLAReport);
}

message QueryMetricsRequest {
  string metric_name = 1;
  opsnexus.common.TimeRange time_range = 2;
  string aggregation = 3;     // avg, sum, min, max, count, p50, p90, p95, p99
  string interval = 4;        // e.g., "1m", "5m", "1h", "1d"
  map<string, string> filters = 5;
  repeated string group_by = 6;
}

message QueryMetricsResponse {
  repeated MetricSeries series = 1;
}

message MetricSeries {
  map<string, string> labels = 1;
  repeated DataPoint data_points = 2;
}

message DataPoint {
  google.protobuf.Timestamp timestamp = 1;
  double value = 2;
}

message GetSLAReportRequest {
  string service_name = 1;
  opsnexus.common.TimeRange time_range = 2;
}

message SLAReport {
  string service_name = 1;
  double availability_percent = 2;
  double mttr_seconds = 3;          // Mean Time To Recovery
  double mtta_seconds = 4;          // Mean Time To Acknowledge
  int64 total_incidents = 5;
  int64 p0_incidents = 6;
  int64 p1_incidents = 7;
  opsnexus.common.TimeRange time_range = 8;
}
