global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert-rules.yml"

scrape_configs:
  # Backend services (metrics exposed on HTTP port + 1)
  - job_name: 'svc-log'
    static_configs:
      - targets: ['host.docker.internal:8081']
  - job_name: 'svc-alert'
    static_configs:
      - targets: ['host.docker.internal:8082']
  - job_name: 'svc-incident'
    static_configs:
      - targets: ['host.docker.internal:8083']
  - job_name: 'svc-cmdb'
    static_configs:
      - targets: ['host.docker.internal:8084']
  - job_name: 'svc-notify'
    static_configs:
      - targets: ['host.docker.internal:8085']
  - job_name: 'svc-ai'
    static_configs:
      - targets: ['host.docker.internal:8086']
  - job_name: 'svc-analytics'
    static_configs:
      - targets: ['host.docker.internal:8087']

  # Middleware exporters
  - job_name: 'kafka'
    static_configs:
      - targets: ['kafka:9092']
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
  - job_name: 'redis-exporter'
    static_configs:
      - targets: ['redis-exporter:9121']
  - job_name: 'elasticsearch-exporter'
    static_configs:
      - targets: ['es-exporter:9114']
  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse-exporter:9116']
