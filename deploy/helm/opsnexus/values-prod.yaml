    maxReplicas: 8
    targetCPUUtilization: 60

svc-analytics:
  replicas: 3
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 500m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 6
    targetCPUUtilization: 70

frontend:
  replicas: 3
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

ingress:
  tls:
    enabled: true
  annotations:
    nginx.ingress.kubernetes.io/rate-limit: "100"

podAntiAffinity:
  enabled: true
