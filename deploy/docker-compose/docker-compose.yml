version: "3.9"

networks:
  opsnexus-net:
    driver: bridge

volumes:
  pg-log-data:
  pg-alert-data:
  pg-incident-data:
  pg-cmdb-data:
  pg-notify-data:
  pg-ai-data:
  pg-analytics-data:
  pg-change-data:
  pg-orchestration-data:
  redis-data:
  kafka-data:
  es-data:
  clickhouse-data:
  minio-data:
  prometheus_data:
  grafana_data:

services:
  # ============================================================
  # PostgreSQL Instances
  # ============================================================

  pg-log:
    image: postgres:16
    container_name: opsnexus-pg-log
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${LOG_DB_NAME}
    volumes:
      - pg-log-data:/var/lib/postgresql/data
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${LOG_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg-alert:
    image: postgres:16
    container_name: opsnexus-pg-alert
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${ALERT_DB_NAME}
    volumes:
      - pg-alert-data:/var/lib/postgresql/data
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${ALERT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg-incident:
    image: postgres:16
    container_name: opsnexus-pg-incident
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${INCIDENT_DB_NAME}
    volumes:
      - pg-incident-data:/var/lib/postgresql/data
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${INCIDENT_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg-cmdb:
    image: postgres:16
    container_name: opsnexus-pg-cmdb
    restart: unless-stopped
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${CMDB_DB_NAME}
    volumes:
      - pg-cmdb-data:/var/lib/postgresql/data
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${CMDB_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg-notify:
    image: postgres:16
    container_name: opsnexus-pg-notify
    restart: unless-stopped
    ports:
      - "5437:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${NOTIFY_DB_NAME}
    volumes:
      - pg-notify-data:/var/lib/postgresql/data
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${NOTIFY_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg-ai:
    image: postgres:16
    container_name: opsnexus-pg-ai
    restart: unless-stopped
    ports:
      - "5438:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${AI_DB_NAME}
    volumes:
      - pg-ai-data:/var/lib/postgresql/data
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${AI_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg-analytics:
    image: postgres:16
    container_name: opsnexus-pg-analytics
    restart: unless-stopped
    ports:
      - "5439:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${ANALYTICS_DB_NAME}
    volumes:
      - pg-analytics-data:/var/lib/postgresql/data
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${ANALYTICS_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg-change:
    image: postgres:16
    container_name: opsnexus-pg-change
    restart: unless-stopped
    ports:
      - "5440:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${CHANGE_DB_NAME}
    volumes:
      - pg-change-data:/var/lib/postgresql/data
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${CHANGE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg-orchestration:
    image: postgres:16
    container_name: opsnexus-pg-orchestration
    restart: unless-stopped
    ports:
      - "5441:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${ORCHESTRATION_DB_NAME}
    volumes:
      - pg-orchestration-data:/var/lib/postgresql/data
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${ORCHESTRATION_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Middleware
  # ============================================================

  redis:
    image: redis:7
    container_name: opsnexus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.6
    container_name: opsnexus-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_KRAFT_CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID}
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: bitnami/kafka:3.6
    container_name: opsnexus-kafka-init
    restart: "on-failure"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_BIN: /opt/bitnami/kafka/bin
      KAFKA_REPLICATION_FACTOR: 1
    volumes:
      - ../scripts/init-kafka-topics.sh:/scripts/init-kafka-topics.sh:ro
    command: ["/bin/bash", "/scripts/init-kafka-topics.sh"]
    networks:
      - opsnexus-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: opsnexus-elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  clickhouse:
    image: clickhouse/clickhouse-server:23
    container_name: opsnexus-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --query 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: opsnexus-minio
    restart: unless-stopped
    ports:
      - "9010:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: opsnexus-keycloak
    restart: unless-stopped
    ports:
      - "8080:8080"
    command: start-dev --import-realm
    volumes:
      - ../keycloak/opsnexus-realm.json:/opt/keycloak/data/import/opsnexus-realm.json:ro
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://pg-ai:5432/${AI_DB_NAME}
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      pg-ai:
        condition: service_healthy
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  kong:
    image: kong:3
    container_name: opsnexus-kong
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      KONG_DATABASE: ${KONG_DATABASE}
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
    volumes:
      - ./kong.yml:/etc/kong/kong.yml:ro
    networks:
      - opsnexus-net
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============ OpsNexus 微服务 ============
  svc-log:
    build:
      context: ../..
      dockerfile: services/svc-log/Dockerfile
    image: opsnexus/svc-log:dev
    ports:
      - "8081:8081"
      - "9085:9085"
    environment:
      - DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg-log:5432/log_db?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - ES_URL=http://elasticsearch:9200
      - HTTP_PORT=8081
      - GRPC_PORT=9085
    depends_on:
      pg-log:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - opsnexus-net
    restart: unless-stopped

  svc-alert:
    build:
      context: ../..
      dockerfile: services/svc-alert/Dockerfile
    image: opsnexus/svc-alert:dev
    ports:
      - "8082:8082"
      - "9086:9086"
    environment:
      - DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg-alert:5432/alert_db?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - HTTP_PORT=8082
      - GRPC_PORT=9086
    depends_on:
      pg-alert:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - opsnexus-net
    restart: unless-stopped

  svc-incident:
    build:
      context: ../..
      dockerfile: services/svc-incident/Dockerfile
    image: opsnexus/svc-incident:dev
    ports:
      - "8083:8083"
      - "9083:9083"
    environment:
      - DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg-incident:5432/incident_db?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - HTTP_PORT=8083
      - GRPC_PORT=9083
    depends_on:
      pg-incident:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - opsnexus-net
    restart: unless-stopped

  svc-cmdb:
    build:
      context: ../..
      dockerfile: services/svc-cmdb/Dockerfile
    image: opsnexus/svc-cmdb:dev
    ports:
      - "8084:8084"
      - "9084:9084"
    environment:
      - DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg-cmdb:5432/cmdb_db?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - HTTP_PORT=8084
      - GRPC_PORT=9084
    depends_on:
      pg-cmdb:
        condition: service_healthy
    networks:
      - opsnexus-net
    restart: unless-stopped

  svc-notify:
    build:
      context: ../..
      dockerfile: services/svc-notify/Dockerfile
    image: opsnexus/svc-notify:dev
    ports:
      - "8085:8085"
      - "9082:9082"
    environment:
      - DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg-notify:5432/notify_db?sslmode=disable
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - KAFKA_BROKERS=kafka:9092
      - HTTP_PORT=8085
      - GRPC_PORT=9082
    depends_on:
      pg-notify:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - opsnexus-net
    restart: unless-stopped

  svc-ai:
    build:
      context: ../..
      dockerfile: services/svc-ai/Dockerfile
    image: opsnexus/svc-ai:dev
    ports:
      - "8086:8086"
      - "9081:9081"
    environment:
      - DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg-ai:5432/ai_db?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - HTTP_PORT=8086
      - GRPC_PORT=9081
    depends_on:
      pg-ai:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - opsnexus-net
    restart: unless-stopped

  svc-analytics:
    build:
      context: ../..
      dockerfile: services/svc-analytics/Dockerfile
    image: opsnexus/svc-analytics:dev
    ports:
      - "8087:8087"
      - "9087:9087"
    environment:
      - DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg-analytics:5432/analytics_db?sslmode=disable
      - CLICKHOUSE_DSN=clickhouse://default:@clickhouse:9000/default
      - KAFKA_BROKERS=kafka:9092
      - HTTP_PORT=8087
      - GRPC_PORT=9087
    depends_on:
      pg-analytics:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    networks:
      - opsnexus-net
    restart: unless-stopped

  svc-change:
    build:
      context: ../..
      dockerfile: services/svc-change/Dockerfile
    image: opsnexus/svc-change:dev
    ports:
      - "8088:8088"
      - "9088:9088"
    environment:
      - DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg-change:5432/change_db?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - HTTP_PORT=8088
      - GRPC_PORT=9088
    depends_on:
      pg-change:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - opsnexus-net
    restart: unless-stopped

  svc-orchestration:
    build:
      context: ../..
      dockerfile: services/svc-orchestration/Dockerfile
    image: opsnexus/svc-orchestration:dev
    ports:
      - "8089:8089"
      - "9089:9089"
    environment:
      - DB_DSN=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg-orchestration:5432/orchestration_db?sslmode=disable
      - KAFKA_BROKERS=kafka:9092
      - HTTP_PORT=8089
      - GRPC_PORT=9089
    depends_on:
      pg-orchestration:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - opsnexus-net
    restart: unless-stopped

  # ============================================================
  # Exporters
  # ============================================================

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: opsnexus-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pg-log:5432/log_db?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - pg-log
    networks:
      - opsnexus-net
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: opsnexus-redis-exporter
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    ports:
      - "9121:9121"
    depends_on:
      - redis
    networks:
      - opsnexus-net
    restart: unless-stopped

  es-exporter:
    image: prometheuscommunity/elasticsearch-exporter:v1.7.0
    container_name: opsnexus-es-exporter
    command:
      - '--es.uri=http://elasticsearch:9200'
      - '--es.all'
      - '--es.indices'
    ports:
      - "9114:9114"
    depends_on:
      - elasticsearch
    networks:
      - opsnexus-net
    restart: unless-stopped

  clickhouse-exporter:
    image: f1yegor/clickhouse-exporter:latest
    container_name: opsnexus-clickhouse-exporter
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_SCRAPE_URI: http://clickhouse:8123
    ports:
      - "9116:9116"
    depends_on:
      - clickhouse
    networks:
      - opsnexus-net
    restart: unless-stopped

  # ============================================================
  # Monitoring
  # ============================================================

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: opsnexus-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - opsnexus-net

  grafana:
    image: grafana/grafana:10.3.0
    container_name: opsnexus-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
    networks:
      - opsnexus-net
