_format_version: "3.0"

services:
  - name: svc-log
    url: http://host.docker.internal:8081
    routes:
      - name: svc-log-route
        paths:
          - /api/v1/log
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local
      - name: cors
        config:
          origins: ["*"]
          methods: ["GET", "POST", "PUT", "DELETE", "PATCH", "OPTIONS"]
          headers: ["Accept", "Authorization", "Content-Type"]
          credentials: true
          max_age: 3600

