# =============================================================================
# OpsNexus GitLab CI/CD Pipeline
# Monorepo: 7 Go services + frontend (shell + 9 sub-apps)
# =============================================================================

stages:
  - lint
  - test
  - build
  - scan
  - deploy-dev
  - deploy-staging
  - deploy-prod

variables:
  GO_VERSION: "1.22"
  NODE_VERSION: "20"
  DOCKER_REGISTRY: "${CI_REGISTRY}"
  DOCKER_IMAGE_PREFIX: "${CI_REGISTRY_IMAGE}"
  COVERAGE_THRESHOLD_GO: "70"
  COVERAGE_THRESHOLD_FE: "60"

# =============================================================================
# YAML Anchors & Templates
# =============================================================================

# --- Path-based trigger rules ---
.service-changes: &service-changes
  changes:
    - services/${SERVICE_NAME}/**/*
    - pkg/**/*

.frontend-changes: &frontend-changes
  changes:
    - frontend/**/*

# --- Base templates ---
.go-base:
  image: golang:${GO_VERSION}
  before_script:
    - cd services/${SERVICE_NAME}
  tags:
    - docker

.frontend-base:
  image: node:${NODE_VERSION}
  before_script:
    - cd frontend
    - npm ci --prefer-offline
  tags:
    - docker

.deploy-base:
  image: alpine/helm:latest
  before_script:
    - helm version
  tags:
    - docker

# --- Go service job templates ---
.go-lint-template:
  extends: .go-base
  stage: lint
  script:
    - golangci-lint run ./...
  rules:
    - <<: *service-changes

.go-test-template:
  extends: .go-base
  stage: test
  script:
    - go test ./... -race -coverprofile=coverage.out
    - go tool cover -func=coverage.out | grep total | awk '{print $3}'
    - |
      COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
      echo "Coverage: ${COVERAGE}%"
      if [ "$(echo "${COVERAGE} < ${COVERAGE_THRESHOLD_GO}" | bc)" -eq 1 ]; then
        echo "ERROR: Coverage ${COVERAGE}% is below threshold ${COVERAGE_THRESHOLD_GO}%"
        exit 1
      fi
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: services/${SERVICE_NAME}/coverage.out
    expire_in: 7 days
  rules:
    - <<: *service-changes

.go-build-template:
  extends: .go-base
  stage: build
  script:
    - CGO_ENABLED=0 GOOS=linux go build -o bin/server ./cmd/server
    - >
      docker build
      -t ${DOCKER_IMAGE_PREFIX}/${SERVICE_NAME}:${CI_COMMIT_SHA}
      -t ${DOCKER_IMAGE_PREFIX}/${SERVICE_NAME}:${CI_COMMIT_REF_SLUG}
      -f Dockerfile ../..
    - docker push ${DOCKER_IMAGE_PREFIX}/${SERVICE_NAME}:${CI_COMMIT_SHA}
    - docker push ${DOCKER_IMAGE_PREFIX}/${SERVICE_NAME}:${CI_COMMIT_REF_SLUG}
  rules:
    - <<: *service-changes

.trivy-scan-template:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --severity HIGH,CRITICAL --exit-code 1 ${DOCKER_IMAGE_PREFIX}/${SERVICE_NAME}:${CI_COMMIT_SHA}
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      changes:
        - services/${SERVICE_NAME}/**/*
        - pkg/**/*
  allow_failure: false

# =============================================================================
# Go Services: svc-log
# =============================================================================

lint:svc-log:
  extends: .go-lint-template
  variables:
    SERVICE_NAME: svc-log

test:svc-log:
