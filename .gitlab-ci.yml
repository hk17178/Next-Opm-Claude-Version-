# =============================================================================
# Frontend: shell + 9 sub-apps
# =============================================================================

lint:frontend:
  extends: .frontend-base
  stage: lint
  script:
    - npx eslint 'shell/src/**' 'app-*/src/**' 'packages/*/src/**'
  rules:
    - <<: *frontend-changes

test:frontend:
  extends: .frontend-base
  stage: test
  script:
    - npx vitest run --coverage
    - |
      COVERAGE=$(npx vitest run --coverage --reporter=json 2>/dev/null | grep -oP '"lines":\s*\K[\d.]+' || echo "0")
      echo "Frontend coverage: ${COVERAGE}%"
      if [ "$(echo "${COVERAGE} < ${COVERAGE_THRESHOLD_FE}" | bc)" -eq 1 ]; then
        echo "ERROR: Frontend coverage ${COVERAGE}% is below threshold ${COVERAGE_THRESHOLD_FE}%"
        exit 1
      fi
  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
    expire_in: 7 days
  rules:
    - <<: *frontend-changes

build:frontend:
  extends: .frontend-base
  stage: build
  script:
    - npx vite build
    - >
      docker build
      -t ${DOCKER_IMAGE_PREFIX}/frontend:${CI_COMMIT_SHA}
      -t ${DOCKER_IMAGE_PREFIX}/frontend:${CI_COMMIT_REF_SLUG}
      .
    - docker push ${DOCKER_IMAGE_PREFIX}/frontend:${CI_COMMIT_SHA}
    - docker push ${DOCKER_IMAGE_PREFIX}/frontend:${CI_COMMIT_REF_SLUG}
  rules:
    - <<: *frontend-changes

scan:frontend:
  stage: scan
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --severity HIGH,CRITICAL --exit-code 1 ${DOCKER_IMAGE_PREFIX}/frontend:${CI_COMMIT_SHA}
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master"'
      changes:
        - frontend/**/*

# =============================================================================
# Deploy: Dev (auto on develop branch)
# =============================================================================

deploy:dev:
  extends: .deploy-base
  stage: deploy-dev
  environment:
    name: dev
    url: https://dev.opsnexus.internal
  script:
    - >
      helm upgrade --install opsnexus deploy/helm/opsnexus
      --namespace opsnexus-dev --create-namespace
      -f deploy/helm/opsnexus/values.yaml
      -f deploy/helm/opsnexus/values-dev.yaml
      --set global.image.tag=${CI_COMMIT_SHA}
      --wait --timeout 5m
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

# =============================================================================
# Deploy: Staging (manual trigger)
# =============================================================================

deploy:staging:
  extends: .deploy-base
  stage: deploy-staging
  environment:
    name: staging
    url: https://staging.opsnexus.internal
  script:
    - >
      helm upgrade --install opsnexus deploy/helm/opsnexus
      --namespace opsnexus-staging --create-namespace
      -f deploy/helm/opsnexus/values.yaml
      -f deploy/helm/opsnexus/values-staging.yaml
      --set global.image.tag=${CI_COMMIT_SHA}
      --wait --timeout 5m
  rules:
    - if: '$CI_COMMIT_BRANCH =~ /^release\//'
      when: manual

# =============================================================================
# Deploy: Prod (manual + protected, main branch only)
# =============================================================================

deploy:prod:
  extends: .deploy-base
  stage: deploy-prod
  environment:
    name: production
    url: https://ops.company.com
  script:
    - >
      helm upgrade --install opsnexus deploy/helm/opsnexus
      --namespace opsnexus --create-namespace
      -f deploy/helm/opsnexus/values.yaml
      -f deploy/helm/opsnexus/values-prod.yaml
      --set global.image.tag=${CI_COMMIT_SHA}
      --wait --timeout 10m
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: false
  resource_group: production
