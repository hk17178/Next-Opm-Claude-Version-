server:
  http_port: 8086
  grpc_port: 9081
  mode: debug  # debug | release

database:
  host: localhost
  port: 5432
  user: opsnexus
  password: opsnexus
  dbname: opsnexus_ai
  sslmode: disable
  max_open_conns: 20
  max_idle_conns: 5

redis:
  addr: localhost:6379
  password: ""
  db: 6

kafka:
  brokers:
    - localhost:9092
  consumer_group: svc-ai
  topics:
    alert_fired: opsnexus.alert.fired
    incident_created: opsnexus.incident.created
    operation_logged: opsnexus.operation.logged
  producer_topic: opsnexus.ai.analysis.done

ai:
  default_timeout_seconds: 55
  max_context_tokens: 5000
  min_context_tokens: 2000
  circuit_breaker:
    failure_threshold: 5
    success_threshold: 3
    timeout_seconds: 60
  desensitize:
    enabled: true
    patterns_file: configs/sensitive_patterns.yaml

logging:
  level: info
  format: json
