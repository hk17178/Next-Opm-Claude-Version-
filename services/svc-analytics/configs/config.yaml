server:
  http_addr: ":8087"
  grpc_addr: ":9087"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s

postgres:
  host: ${OPSNEXUS_ANALYTICS_PG_HOST:localhost}
  port: ${OPSNEXUS_ANALYTICS_PG_PORT:5432}
  user: ${OPSNEXUS_ANALYTICS_PG_USER:opsnexus}
  password: ${OPSNEXUS_ANALYTICS_PG_PASSWORD:opsnexus}
  dbname: ${OPSNEXUS_ANALYTICS_PG_NAME:analytics_db}
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 5m

clickhouse:
  addrs: ${OPSNEXUS_CLICKHOUSE_ADDRS:localhost:9000}
  database: ${OPSNEXUS_CLICKHOUSE_DB:opsnexus_metrics}
  username: ${OPSNEXUS_CLICKHOUSE_USER:default}
  password: ${OPSNEXUS_CLICKHOUSE_PASSWORD:}

kafka:
  brokers: ${OPSNEXUS_KAFKA_BROKERS:localhost:9092}
  consumer_group: svc-analytics
  topics:
    - opsnexus.metrics
    - opsnexus.alerts
    - opsnexus.incidents

auth:
  keycloak_url: ${OPSNEXUS_KEYCLOAK_URL:}
  realm: ${OPSNEXUS_KEYCLOAK_REALM:opsnexus}

health:
  liveness_path: /healthz
  readiness_path: /readyz

sla:
  default_calculation_interval: 5m
  retention_days: 365

knowledge:
  embedding_dim: 1536
  similarity_threshold: 0.75

log_level: info
