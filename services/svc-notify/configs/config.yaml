server:
  http_port: 8085
  grpc_port: 9082
  mode: debug

database:
  host: localhost
  port: 5432
  user: opsnexus
  password: opsnexus
  dbname: opsnexus_notify
  sslmode: disable
  max_open_conns: 20
  max_idle_conns: 5

redis:
  addr: localhost:6379
  password: ""
  db: 5

kafka:
  brokers:
    - localhost:9092
  consumer_group: svc-notify
  topics:
    alert_fired: opsnexus.alert.fired
    alert_resolved: opsnexus.alert.resolved
    incident_created: opsnexus.incident.created
    incident_updated: opsnexus.incident.updated
    incident_resolved: opsnexus.incident.resolved
    ai_analysis_done: opsnexus.ai.analysis.done
  producer_topic: opsnexus.notify.sent

broadcast:
  # Broadcast intervals per severity
  intervals:
    P0: 5m
    P1: 10m
    P2: 30m
    P3: 60m

  # Lifecycle nodes that trigger broadcasts
  lifecycle_nodes:
    - alert_fired
    - incident_created
    - ai_analysis_done
    - incident_acknowledged
    - incident_phase_changed
    - incident_resolved
    - incident_postmortem

dedup:
  # Dedup window for identical notifications
  window: 5m
  # Max notifications to merge
  merge_limit: 10

channel_health:
  probe_interval: 60s
  failure_threshold: 3

logging:
  level: info
  format: json
