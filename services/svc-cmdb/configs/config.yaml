server:
  http_addr: ":8084"
  grpc_addr: ":9084"
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 60s

database:
  host: ${OPSNEXUS_CMDB_DB_HOST:localhost}
  port: ${OPSNEXUS_CMDB_DB_PORT:5432}
  user: ${OPSNEXUS_CMDB_DB_USER:opsnexus}
  password: ${OPSNEXUS_CMDB_DB_PASSWORD:opsnexus}
  dbname: ${OPSNEXUS_CMDB_DB_NAME:cmdb_db}
  sslmode: disable
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_lifetime: 5m

kafka:
  brokers: ${OPSNEXUS_KAFKA_BROKERS:localhost:9092}

auth:
  keycloak_url: ${OPSNEXUS_KEYCLOAK_URL:}
  realm: ${OPSNEXUS_KEYCLOAK_REALM:opsnexus}

health:
  liveness_path: /healthz
  readiness_path: /readyz

discovery:
  scan_interval: 30m
  snmp_community: ${OPSNEXUS_CMDB_SNMP_COMMUNITY:public}
  snmp_timeout: 10s

log_level: info
