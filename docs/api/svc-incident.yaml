openapi: 3.0.3
info:
  title: OpsNexus Incident Service API
  description: |
    Incident lifecycle management service.
    Handles creation, assignment, escalation, and resolution of incidents.
  version: 0.1.0
  contact:
    name: OpsNexus Team
servers:
  - url: /api/v1/incident
    description: API Gateway routed

tags:
  - name: incidents
    description: Incident CRUD and lifecycle
  - name: timeline
    description: Incident timeline entries

paths:
  /incidents:
    get:
      operationId: listIncidents
      tags: [incidents]
      summary: List incidents
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, investigating, identified, mitigated, resolved, closed]
        - name: severity
          in: query
          schema:
            type: string
            enum: [P0, P1, P2, P3, P4]
        - name: assignee_id
          in: query
          schema:
            type: string
        - $ref: '#/components/parameters/PageToken'
        - $ref: '#/components/parameters/PageSize'
      responses:
        '200':
          description: List of incidents
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncidentListResponse'

    post:
      operationId: createIncident
      tags: [incidents]
      summary: Create a new incident
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentCreateRequest'
      responses:
        '201':
          description: Incident created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'
        '400':
          $ref: '#/components/responses/BadRequest'

  /incidents/{incident_id}:
    get:
      operationId: getIncident
      tags: [incidents]
      summary: Get incident details
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      responses:
        '200':
          description: Incident details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: updateIncident
      tags: [incidents]
      summary: Update incident fields
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IncidentUpdateRequest'
      responses:
        '200':
          description: Incident updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Incident'

  /incidents/{incident_id}/assign:
    post:
      operationId: assignIncident
      tags: [incidents]
      summary: Assign incident to a responder
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assignee_id]
              properties:
                assignee_id:
                  type: string
      responses:
        '200':
          description: Incident assigned

  /incidents/{incident_id}/escalate:
    post:
      operationId: escalateIncident
      tags: [incidents]
      summary: Escalate incident severity
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [severity]
              properties:
                severity:
                  type: string
                  enum: [P0, P1, P2, P3, P4]
                reason:
                  type: string
      responses:
        '200':
          description: Incident escalated

  /incidents/{incident_id}/resolve:
    post:
      operationId: resolveIncident
      tags: [incidents]
      summary: Resolve an incident
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                resolution_note:
                  type: string
      responses:
        '200':
          description: Incident resolved

  /incidents/{incident_id}/timeline:
    get:
      operationId: getTimeline
      tags: [timeline]
      summary: Get incident timeline
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      responses:
        '200':
          description: Timeline entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimelineResponse'

    post:
      operationId: addTimelineEntry
      tags: [timeline]
      summary: Add a timeline entry
      parameters:
        - $ref: '#/components/parameters/IncidentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimelineEntryCreate'
      responses:
        '201':
          description: Timeline entry added

components:
  parameters:
    IncidentId:
      name: incident_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PageToken:
      name: page_token
      in: query
      schema:
        type: string
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  schemas:
    Incident:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [P0, P1, P2, P3, P4]
        status:
          type: string
          enum: [open, investigating, identified, mitigated, resolved, closed]
        assignee_id:
          type: string
        related_alert_ids:
          type: array
          items:
            type: string
            format: uuid
        affected_ci_ids:
          type: array
          items:
            type: string
        labels:
          type: object
          additionalProperties:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        resolved_at:
          type: string
          format: date-time

    IncidentCreateRequest:
      type: object
      required: [title, severity]
      properties:
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [P0, P1, P2, P3, P4]
        assignee_id:
          type: string
        related_alert_ids:
          type: array
          items:
            type: string
            format: uuid
        affected_ci_ids:
          type: array
          items:
            type: string
        labels:
          type: object
          additionalProperties:
            type: string

    IncidentUpdateRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        severity:
          type: string
          enum: [P0, P1, P2, P3, P4]
        status:
          type: string
          enum: [open, investigating, identified, mitigated, resolved, closed]
        labels:
          type: object
          additionalProperties:
            type: string

    IncidentListResponse:
      type: object
      properties:
        incidents:
          type: array
          items:
            $ref: '#/components/schemas/Incident'
        next_page_token:
          type: string

    TimelineEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          type: string
          enum: [comment, status_change, assignment, escalation, ai_analysis, notification]
        content:
          type: string
        author_id:
          type: string
        created_at:
          type: string
          format: date-time

    TimelineEntryCreate:
      type: object
      required: [type, content]
      properties:
        type:
          type: string
          enum: [comment, status_change, assignment, escalation, ai_analysis, notification]
        content:
          type: string

    TimelineResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/TimelineEntry'

    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - BearerAuth: []
